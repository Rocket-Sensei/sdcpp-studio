models:
  # ==================== Flux Models ====================
  flux1-schnell-fp8:
    name: "FLUX.1 Schnell"
    quant: "Q8_0"
    description: "FLUX.1 Schnell - Fast generation model [Q8_0]"
    capabilities: ["text-to-image"]
    supports_negative_prompt: false
    args:
      - "--diffusion-model"
      - "./models/flux1-schnell/flux1-schnell-Q8_0.gguf"
      - "--vae"
      - "./models/vae/flux1_f32.safetensors"
      - "--clip_l"
      - "./models/clips/clip_l.safetensors"
      - "--t5xxl"
      - "./models/clips/t5xxl_fp16.safetensors"
      - "-v"
      - "--steps"
      - "4"
    mode: "on_demand"
    exec_mode: "auto"
    # Port is dynamically allocated (40000-49000 range)
    model_type: "text-to-image"
    default_size: "1024x1024"
    startup_timeout: 120000
    generation_params:
      cfg_scale: 1.0
      sample_steps: 4
      sampling_method: "euler"

  flux1-schnell-fp8-cli:
    enabled: false
    name: "FLUX.1 Schnell FP8 - CLI mode"
    quant: "Q8_0"
    description: "FLUX.1 Schnell FP8 used via sd-cli"
