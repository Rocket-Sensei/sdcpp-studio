# SDXL Models
# Based on sdcpp/docs/sd.md - SDXL requires VAE for proper operation
models:
  # ==================== SDXL Finetunes ====================
  # SDXL finetune models - use SDXL VAE
  epicrealism-xl:
    enabled: false
    name: "EpicRealism XL"
    description: "SDXL architecture with pure fix - supports negative prompts"
    capabilities: ["text-to-image"]
    supports_negative_prompt: true
    command: "./bin/sd-server"
    args:
      - "-m"
      - "./models/sdxl-other/epicrealismXL_pureFix.safetensors"
      - "--vae"
      - "./models/vae/sdxl-vae-fp16-fix.safetensors"
      - "-v"
      - "--offload-to-cpu"
      - "--steps"
      - "30"
    mode: "on_demand"
    exec_mode: "server"
    # Port is dynamically allocated (40000-49000 range)
    model_type: "text-to-image"
    default_size: "1024x1024"
    generation_params:
      cfg_scale: 7.0
      sample_steps: 30
      sampling_method: "euler_a"

