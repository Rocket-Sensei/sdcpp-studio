# Models configuration
models:
  # ==================== Qwen Image (Server Mode) ====================
  qwen-image-2512:
    name: "Qwen Image 2512"
    description: "Qwen Image 2512"
    default: true
    capabilities: ["text-to-image"]
    supports_negative_prompt: false
    args:
      - "--diffusion-model"
      - "./models/qwen-image-2512/qwen-image-2512-Q3_K_M.gguf"
      - "--vae"
      - "./models/vae/qwen_image_vae.safetensors"
      - "--qwen2vl"
      - "./models/qwen25/Qwen2.5-VL-7B-Instruct.Q4_K_M.gguf"
      - "-v"
      - "--flow-shift"
      - "3"
      - "--steps"
      - "24"
    mode: "on_demand"
    exec_mode: "auto"
    # Port is dynamically allocated (40000-49000 range)
    model_type: "text-to-image"
    default_size: "1024x1024"
    startup_timeout: 150000
    # Auto-stop after 15 minutes of inactivity (overrides global default of 10m)
    autostop: "15m"
    generation_params:
      cfg_scale: 1.0
      sample_steps: 24
      sampling_method: "euler"

  qwen-image:
    name: "Qwen Image"
    description: "Qwen Image - advanced text-to-image model with complex text rendering and precise image editing capabilities"
    default: true
    capabilities: ["text-to-image"]
    supports_negative_prompt: false
    args:
      - "--diffusion-model"
      - "./models/qwen-image/Qwen_Image-Q4_K_M.gguf"
      - "--vae"
      - "./models/vae/qwen_image_vae.safetensors"
      - "--qwen2vl"
      - "./models/qwen25/Qwen2.5-VL-7B-Instruct.Q4_K_M.gguf"
      - "-v"
      - "--flow-shift"
      - "3"
      - "--steps"
      - "24"
    mode: "on_demand"
    exec_mode: "auto"
    # Port is dynamically allocated (40000-49000 range)
    model_type: "text-to-image"
    default_size: "1024x1024"
    startup_timeout: 150000
    # Auto-stop after 15 minutes of inactivity (overrides global default of 10m)
    autostop: "15m"
    generation_params:
      cfg_scale: 1.0
      sample_steps: 24
      sampling_method: "euler"

  # ==================== Qwen Image CLI Mode ====================
  qwen-image-cli:
    enabled: false
    name: "Qwen Image - CLI mode"
    description: "Qwen Image used via sd-cli"
    capabilities: ["text-to-image"]
    supports_negative_prompt: false
    args:
      - "--diffusion-model"
      - "./models/qwen-image/Qwen_Image-Q4_K_M.gguf"
      - "--vae"
      - "./models/vae/qwen_image_vae.safetensors"
      - "--qwen2vl"
      - "./models/qwen25/Qwen2.5-VL-7B-Instruct.Q4_K_M.gguf"
      - "-v"
      - "--offload-to-cpu"
      - "--clip-on-cpu"
      - "--diffusion-fa"
      - "--flow-shift"
      - "3"
    mode: "on_demand"
    exec_mode: "cli"
    model_type: "text-to-image"
    default_size: "1024x1024"
    generation_params:
      cfg_scale: 1.0
      sample_steps: 24
      sampling_method: "euler"
