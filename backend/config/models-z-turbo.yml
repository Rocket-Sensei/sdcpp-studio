# Models configuration
models:
  # ==================== Z-Image Turbo (Server Mode) ====================
  # NOTE: Z-Image-Turbo is a distilled model that does not rely on classifier-free guidance.
  # Recommended settings: cfg_scale=0.0-1.0 (typically 0.0), steps=4-9 (typically 9)
  z-image:
    name: "Z-Image"
    quant: "Q8_0"
    description: "Z-Image"
    capabilities: ["text-to-image"]
    supports_negative_prompt: true
    mode: "on_demand"
    command: "./bin/sd-server"
    # Port is dynamically allocated (40000-49000 range)
    args:
      - "--diffusion-model"
      - "./models/z-image/z-image-Q8_0.gguf"
      - "--vae"
      - "./models/vae/flux1_f32.safetensors"
      - "--llm"
      - "./models/qwen3/qwen_3_4b.safetensors"
      - "-v"
      - "--offload-to-cpu"
      - "--clip-on-cpu"
      - "--diffusion-fa"
      - "--steps"
      - "40"
    exec_mode: "server"
    model_type: "text-to-image"
    default_size: "1024x1024"
    # Model-specific default parameters for z-image-turbo
    # These are applied when this model is selected
    generation_params:
      cfg_scale: 1
      sample_steps: 40
      sampling_method: "euler"

