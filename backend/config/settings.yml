# Global model settings
# Default model configuration
# Supports separate defaults for different generation types

# Default negative prompt support (defaults to false for most models)
# Models that benefit from negative prompts: SD1.5, SDXL, Pony
supports_negative_prompt: false

# Default auto-stop timeout for models
# Format: number + unit (e.g., "10m", "1h", "30s", "500ms")
# Models will be automatically stopped after this time of running
# Can be overridden per-model using the 'autostop' setting in model configs
default_autostop: "10m"

# Backend enablement toggles
# Set to false to completely disable all models from these backends
backend_settings:
  wan2gp:
    enabled: true
    description: "Wan2GP video generation models (Wan2.1 and Wan2.2)"
  llama:
    enabled: true
    description: "LLM text generation models via llama.cpp"

default_model: qwen-image

default_models:
  text_to_image: qwen-image
  image_to_image: qwen-image-edit-2511-q4-0

# Global memory management defaults
# These apply to all models unless overridden per-model via memory_overrides
# Flags are automatically injected into model args by modelManager
memory_defaults:
  offload_to_cpu: true
  clip_on_cpu: true
  vae_on_cpu: false
  vae_tiling: false
  diffusion_fa: true

# Default execution mode for models
# "auto" = CLI for single images, server for batches (saves VRAM)
# "server" = always use server mode (legacy)
# "cli" = always use CLI mode
default_exec_mode: "auto"
